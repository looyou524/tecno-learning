<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简风格 - 销售培训系统</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #F8F9FA;
            /* 极简的浅灰白背景 */
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        .hero-gradient {
            background: linear-gradient(145deg, #F0F4FF 0%, #E6EEFF 100%);
        }
    </style>
</head>

<body class="text-gray-900 pb-24">

    <!-- 模拟手机屏幕外框 -->
    <div class="max-w-md mx-auto bg-[#F8F9FA] min-h-screen relative shadow-2xl">

        <!-- 头部 Header (对应参考图的顶部) -->
        <header class="flex justify-between items-center px-6 pt-12 pb-4">
            <div class="flex items-center gap-3">
                <img src="https://ui-avatars.com/api/?name=Alex&background=E2E8F0&color=475569&rounded=true"
                    alt="Avatar" class="w-10 h-10 rounded-full">
                <div>
                    <p class="text-sm text-gray-500 font-medium">早上好,</p>
                    <h1 class="text-lg font-bold">Alex 销售顾问</h1>
                </div>
            </div>
            <!-- 通知小铃铛 (SVG) -->
            <button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
            </button>
        </header>

        <main class="px-6">

            <!-- 搜索栏 -->
            <div class="relative mb-6">
                <svg class="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400" width="18" height="18"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" placeholder="搜索话术或场景..."
                    class="w-full bg-white border border-gray-100 text-sm rounded-2xl py-3.5 pl-12 pr-4 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-gray-400 text-gray-700">
            </div>

            <!-- 核心 Banner：今日必修 (完美复刻 "7 DAYS" 卡片) -->
            <section class="hero-gradient rounded-[2rem] p-8 text-center shadow-sm relative overflow-hidden mb-8">
                <!-- 装饰性光晕背景 -->
                <div class="absolute -top-10 -left-10 w-32 h-32 bg-white opacity-50 rounded-full blur-2xl"></div>

                <div class="flex justify-center items-center gap-1 text-blue-600 text-sm font-semibold mb-3">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon
                            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                        </polygon>
                    </svg>
                    <span>今日必修</span>
                </div>

                <h2 class="text-[2.5rem] font-black tracking-tight leading-none mb-2 text-gray-900">
                    晨会话术
                </h2>
                <p class="text-lg font-medium text-gray-700 mb-4">通关实战演练</p>

                <p class="text-xs text-gray-500 leading-relaxed mb-6 px-4">
                    店长指派的每日基本功练习，预计耗时 5 分钟。<br>完成后即可向店长打卡交差。
                </p>

                <button
                    class="bg-[#4F46E5] text-white font-semibold text-sm w-full py-4 rounded-full shadow-md hover:bg-[#4338CA] transition-colors flex justify-center items-center gap-2">
                    立即打卡 <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </section>

            <!-- 列表区：推荐实战场景 (复刻国家列表) -->
            <section>
                <div class="flex justify-between items-center mb-4 px-1">
                    <h3 class="text-base font-bold text-gray-900">推荐实战场景</h3>
                    <a href="#" class="text-sm font-medium text-[#4F46E5]">查看全部</a>
                </div>

                <div class="flex flex-col gap-3">
                    <!-- 列表项 1: 价格异议 -->
                    <div
                        class="bg-white rounded-[1.25rem] p-4 flex items-center justify-between shadow-sm border border-gray-50 hover:border-gray-100 transition-colors">
                        <div class="flex items-center gap-4">
                            <!-- 图标区 -->
                            <div class="w-12 h-12 rounded-full bg-red-50 flex items-center justify-center text-xl">
                                💰
                            </div>
                            <!-- 文字区 -->
                            <div>
                                <h4 class="font-bold text-gray-900 text-sm mb-0.5">顾客嫌"太贵了"</h4>
                                <p class="text-xs text-red-400 font-medium">成单率低 (45%) · 需重点突破</p>
                            </div>
                        </div>
                        <svg class="text-gray-300" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </div>

                    <!-- 列表项 2: 陈列规范 -->
                    <div
                        class="bg-white rounded-[1.25rem] p-4 flex items-center justify-between shadow-sm border border-gray-50 hover:border-gray-100 transition-colors">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-full bg-orange-50 flex items-center justify-center text-xl">
                                📸
                            </div>
                            <div>
                                <h4 class="font-bold text-gray-900 text-sm mb-0.5">门店陈列找茬</h4>
                                <p class="text-xs text-gray-500 font-medium">日常规范 · 找错小游戏</p>
                            </div>
                        </div>
                        <svg class="text-gray-300" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </div>

                    <!-- 列表项 3: 进阶推销 (锁定状态) -->
                    <div
                        class="bg-white rounded-[1.25rem] p-4 flex items-center justify-between shadow-sm border border-gray-50 opacity-70">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center text-xl">
                                🔒
                            </div>
                            <div>
                                <h4 class="font-bold text-gray-500 text-sm mb-0.5">高级连带推销</h4>
                                <p class="text-xs text-gray-400 font-medium">需先完成「太贵了」场景</p>
                            </div>
                        </div>
                        <svg class="text-gray-200" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </div>
                </div>
            </section>
        </main>

        <!-- 底部导航栏 (极简风格) -->
        <nav
            class="absolute bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-gray-100 flex justify-around px-2 py-4 pb-6">
            <!-- 激活状态 (黑色) -->
            <div class="flex flex-col items-center gap-1.5 text-gray-900 cursor-pointer">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
                </svg>
                <span class="text-[10px] font-bold">首页</span>
            </div>
            <!-- 未激活状态 (浅灰) -->
            <div class="flex flex-col items-center gap-1.5 text-gray-400 cursor-pointer hover:text-gray-600">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76" />
                </svg>
                <span class="text-[10px] font-medium">发现场景</span>
            </div>
            <div class="flex flex-col items-center gap-1.5 text-gray-400 cursor-pointer hover:text-gray-600">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
                <span class="text-[10px] font-medium">我的数据</span>
            </div>
        </nav>
    </div>

</body>

</html>
